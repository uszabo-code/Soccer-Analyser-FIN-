# BoT-SORT config tuned for fixed-angle Finnish club camera (Veo Cam 2 / Wisemen style)
# Overhead wide-angle, players ~80-150px tall, FIXED camera (no pan/tilt compensation needed)

tracker_type: botsort

track_high_thresh: 0.25
track_low_thresh: 0.1
new_track_thresh: 0.25
fuse_score: True

# Increased from 30 → 90 (3s at 30fps): players briefly occluded or off-screen
# are reconnected on re-entry rather than getting a new track ID
track_buffer: 150

# 0.65: between original 0.7 and tested 0.55 — enough to re-link after short gaps
match_thresh: 0.65

# Global Motion Compensation: disabled — Veo camera is fixed overhead.
# sparseOptFlow on a static camera finds near-zero global motion, corrupting Kalman predictions
# and causing 2 track IDs to absorb the whole game while everything else fragments into noise.
gmc_method: none

# ReID disabled: OSNet trained on close-up pedestrians, not overhead 80-150px soccer players
proximity_thresh: 0.5
appearance_thresh: 0.25
with_reid: False
model: auto
